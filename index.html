<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harsh Industries Command Center</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f172a, #020617);
        color: white;
    }

    header {
        text-align: center;
        padding: 25px;
        font-size: 30px;
        font-weight: bold;
        letter-spacing: 2px;
    }

    .search-box {
        text-align: center;
        margin: 20px;
    }

    input {
        width: 60%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        font-size: 16px;
        outline: none;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        padding: 40px;
    }

    .card {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        padding: 25px;
        border-radius: 15px;
        transition: 0.3s;
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .card:hover {
        transform: translateY(-5px) scale(1.03);
        background: rgba(255,255,255,0.1);
    }

    .title {
        font-size: 20px;
        margin-bottom: 8px;
    }

    .desc {
        font-size: 14px;
        color: #cbd5f5;
    }

    .top-actions {
        text-align: center;
        margin-top: 10px;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background: #22c55e;
        color: black;
        font-weight: bold;
        cursor: pointer;
    }

    footer {
        text-align: center;
        padding: 15px;
        color: #94a3b8;
        font-size: 12px;
    }
</style>
</head>

<body>

<header>
⚡ HARSH INDUSTRIES COMMAND CENTER
</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search tools... (try typing 'inventory')" onkeyup="filterCards()">
</div>

<div class="top-actions">
<button onclick="openAll()">🚀 Open All Tools</button>
</div>

<div class="container" id="cards">

<div class="card" data-name="inventory stock sheet">
    <div class="title">📦 Inventory Management (1)</div>
    <div class="desc">Google Sheet for stock tracking</div>
</div>

<div class="card" data-name="insurance calculator">
    <div class="title">🛡 Insurance Calculator (2)</div>
    <div class="desc">Calculate insurance value instantly</div>
</div>

<div class="card" data-name="cost calculation barbed wire">
    <div class="title">💰 Cost Calculation Suite (3)</div>
    <div class="desc">Product costing tools</div>
</div>

<div class="card" data-name="electricity bill power tracker">
    <div class="title">⚡ Electricity Tracker (4)</div>
    <div class="desc">Monitor power costs</div>
</div>

</div>

<footer>
© Harsh Industries | Elite Internal System
</footer>

<script>
const links = [
    "https://docs.google.com/spreadsheets/d/1x6kIjL_h771zBKPgu2IrDrZC8bm9OrOl_1D9BiTzEqM/edit?gid=1139777562#gid=1139777562",
    "https://harshlovescode.github.io/HARSHINSURANCECAL/",
    "https://harshlovescode.github.io/harshindustriesCP-calculator-/",
    "https://docs.google.com/spreadsheets/d/1hJCJSiODz2Xw3oMOzBJe_1Dpno_JEIVLg-emlPDZBjY/edit?gid=0#gid=0"
];

const cards = document.querySelectorAll(".card");

// Click open
cards.forEach((card, index) => {
    card.addEventListener("click", () => {
        window.open(links[index], "_blank");
    });
});

// Search filter
function filterCards() {
    let input = document.getElementById("search").value.toLowerCase();
    cards.forEach(card => {
        let name = card.getAttribute("data-name");
        card.style.display = name.includes(input) ? "block" : "none";
    });
}

// Open all tools
function openAll() {
    links.forEach(link => {
        window.open(link, "_blank");
    });
}

// Keyboard shortcuts
document.addEventListener("keydown", function(e) {
    if (e.key >= 1 && e.key <= links.length) {
        window.open(links[e.key - 1], "_blank");
    }
});
</script>

</body>
</html>
